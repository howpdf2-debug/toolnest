.btn-gold:hover{background:var(--gold-d);transform:translateY(-1px)}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem}

.fld{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.75rem}
.fld label{font-size:12px;font-weight:700;color:var(--ink2)}
