<style>
:root{
  --gold:#F5A623;--gold-d:#D4891A;--gold-l:#FEF3DC;--gold-b:rgba(245,166,35,.22);
  --navy:#0F1B3D;--navy-mid:#1A2E5E;--navy-l:#E8ECF5;
  --blue:#1E4FCB;--blue-l:#EEF3FF;
  --green:#00B37E;--green-l:#E6FAF4;
  --ink:#0D0D14;--ink2:#44455A;--ink3:#8A8BA5;
  --paper:#F5F6FA;--white:#FFFFFF;
  --border:#E2E4EF;--border2:#C8CADF;--surface:#EDEEF7;
  --c-compress:#F5620A;--c-compress-l:#FFF0EB;
  --c-convert:#1E4FCB;--c-convert-l:#EEF3FF;
  --c-organize:#00B37E;--c-organize-l:#E6FAF4;
  --c-edit:#6C3FC4;--c-edit-l:#F2EDFF;
  --c-image:#E91E8C;--c-image-l:#FCE4F0;
  --c-prod:#E88B00;--c-prod-l:#FFF8E6;
  --c-biz:#0891B2;--c-biz-l:#E8F8FD;
  --c-calc:#059669;--c-calc-l:#D1FAE5;
  --f-display:'Outfit',sans-serif;--f-body:'Plus Jakarta Sans',sans-serif;
  --r-sm:8px;--r:12px;--r-lg:18px;--r-xl:24px;--r-pill:999px;
  --sh-xs:0 1px 2px rgba(13,13,20,.06);--sh-sm:0 2px 8px rgba(13,13,20,.08);
  --sh:0 4px 16px rgba(13,13,20,.10);--sh-lg:0 8px 32px rgba(13,13,20,.13);
  --sh-gold:0 4px 24px rgba(245,166,35,.30);
  --nav-h:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--f-body);background:var(--paper);color:var(--ink);line-height:1.6}
a{text-decoration:none;color:inherit}img{max-width:100%;display:block}
button{font-family:var(--f-body);cursor:pointer;border:none;outline:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}::-webkit-scrollbar-thumb:hover{background:var(--gold)}

/* NAV injected */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav-h);background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;box-shadow:var(--sh-xs)}

/* LAYOUT */
.page-wrap{padding-top:var(--nav-h)}

/* ── HERO ── */
.tools-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 55%,#1a2e7a 100%);padding:3rem 1.5rem 2.5rem;position:relative;overflow:hidden;text-align:center}
.tools-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle 320px at 85% 40%,rgba(245,166,35,.1) 0%,transparent 60%),radial-gradient(circle 200px at 5% 70%,rgba(30,79,203,.2) 0%,transparent 60%);pointer-events:none}
.tools-hero::after{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:22px 22px;pointer-events:none;mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 20%,transparent 100%)}
.tools-hero-inner{position:relative;z-index:1;max-width:640px;margin:0 auto}
.tools-hero h1{font-family:var(--f-display);font-size:clamp(1.75rem,4vw,2.6rem);font-weight:900;color:#fff;margin-bottom:.6rem;line-height:1.15}
.tools-hero h1 span{color:var(--gold)}
.tools-hero-sub{font-size:15px;color:rgba(255,255,255,.6);margin-bottom:1.5rem}
/* Hero search */
.hero-search{display:flex;align-items:center;gap:0;background:rgba(255,255,255,.95);border-radius:var(--r-pill);overflow:hidden;max-width:520px;margin:0 auto 1.5rem;box-shadow:0 4px 24px rgba(13,13,20,.18)}
.hero-search-input{flex:1;border:none;background:transparent;outline:none;padding:13px 18px;font-size:14.5px;font-family:var(--f-body);color:var(--ink)}
.hero-search-input::placeholder{color:var(--ink3)}
.hero-search-btn{background:var(--gold);color:var(--navy);border:none;padding:10px 20px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:var(--f-body);display:flex;align-items:center;gap:6px;margin:4px;border-radius:var(--r-pill);transition:background .15s}
.hero-search-btn:hover{background:var(--gold-d)}
/* Stats pills */
.hero-stats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.hero-stat-pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:var(--r-pill);padding:5px 13px;font-size:12px;font-weight:700;color:rgba(255,255,255,.85)}
.hero-stat-pill span{color:var(--gold)}

/* ── MAIN ── */
.tools-main{max-width:1180px;margin:0 auto;padding:2rem 1.5rem 4rem}

/* ── CATEGORY TABS ── */
.cat-tabs-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.75rem;position:sticky;top:var(--nav-h);background:var(--paper);padding:.75rem 0;z-index:50;border-bottom:1px solid var(--border)}
.cat-tab{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--r-pill);font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--white);color:var(--ink2);cursor:pointer;transition:all .2s;white-space:nowrap}
.cat-tab:hover{border-color:var(--gold);color:var(--gold-d);background:var(--gold-l)}
.cat-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 2px 10px rgba(15,27,61,.25)}
.cat-tab-count{background:rgba(255,255,255,.2);border-radius:var(--r-pill);padding:1px 7px;font-size:10.5px;font-weight:700}
.cat-tab:not(.active) .cat-tab-count{background:var(--surface);color:var(--ink3)}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;margin-top:.25rem}
.section-title{font-family:var(--f-display);font-size:1.05rem;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:block;width:4px;height:18px;border-radius:2px;flex-shrink:0}
.section-count{font-size:12px;color:var(--ink3);font-weight:600}

/* ── TOOL GRID ── */
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:2.5rem}
.tool-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-xl);padding:1.25rem;cursor:pointer;transition:all .22s;display:flex;align-items:flex-start;gap:12px;position:relative;overflow:hidden;box-shadow:var(--sh-xs)}
.tool-card::after{content:'→';position:absolute;right:10px;bottom:10px;font-size:11px;color:var(--border2);transition:all .2s}
.tool-card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(13,13,20,.12);border-color:transparent}
.tool-card:hover::after{right:7px;color:var(--gold-d)}
.tool-card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tool-card-body{flex:1;min-width:0}
.tool-card-name{font-family:var(--f-display);font-size:13.5px;font-weight:800;color:var(--ink);margin-bottom:3px;line-height:1.3}
.tool-card-desc{font-size:11.5px;color:var(--ink3);line-height:1.5}
.tool-badge{font-size:8px;font-weight:800;padding:2px 6px;border-radius:var(--r-pill);text-transform:uppercase;letter-spacing:.3px;position:absolute;top:10px;right:10px}
.badge-hot{background:#FFE8D6;color:#B85000}
.badge-new{background:#D3F9D8;color:#00612A}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--ink3)}
.empty-state-icon{font-size:3rem;margin-bottom:.75rem}
.empty-state-title{font-family:var(--f-display);font-size:1.1rem;font-weight:800;color:var(--ink2);margin-bottom:.4rem}
.empty-state-sub{font-size:13.5px}

/* ── PRO BANNER ── */
.pro-banner{background:linear-gradient(135deg,var(--navy),var(--navy-mid));border-radius:var(--r-xl);padding:2rem 2.5rem;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap;margin-bottom:2rem;position:relative;overflow:hidden}
.pro-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(circle 200px at 90% 30%,rgba(245,166,35,.15) 0%,transparent 60%)}
.pro-banner-inner{position:relative;z-index:1}
.pro-banner h3{font-family:var(--f-display);font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:.3rem}
.pro-banner p{font-size:13px;color:rgba(255,255,255,.55)}
.pro-banner-btns{display:flex;gap:8px;flex-wrap:wrap;position:relative;z-index:1}
.btn-pro{background:var(--gold);color:var(--navy);padding:10px 22px;border-radius:var(--r-pill);font-size:13.5px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:var(--sh-gold);border:none;font-family:var(--f-body)}
.btn-pro:hover{background:var(--gold-d);transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;padding:10px 22px;border-radius:var(--r-pill);font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid rgba(255,255,255,.2);font-family:var(--f-body)}
.btn-ghost:hover{background:rgba(255,255,255,.18)}

/* ── NO-RESULTS SEARCH ── */
.search-highlight{background:var(--gold-l);border-radius:3px;padding:0 2px}

/* RESPONSIVE */
@media(max-width:820px){.tool-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}.cat-tabs-wrap{top:calc(var(--nav-h) + 0px)}}
@media(max-width:500px){.tool-grid{grid-template-columns:1fr 1fr}.pro-banner{flex-direction:column;text-align:center}.pro-banner-btns{justify-content:center}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tool-grid{animation:fadeUp .3s ease forwards}
</style>
</head>
<body>

<div id="mobileOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none" onclick="TN&&TN.closeMobileSidebar&&TN.closeMobileSidebar()"></div>
<div id="tn-nav"></div>

<div class="page-wrap">

  <!-- HERO -->
  <div class="tools-hero">
    <div class="tools-hero-inner">
      <h1>All <span>Free Tools</span></h1>
      <p class="tools-hero-sub">PDF, Image, Calculator, Business — sab browser-based. Koi server upload nahi.</p>
      <div class="hero-search">
        <input type="text" class="hero-search-input" id="heroSearch"
          placeholder="Tool dhundho — e.g. 'PDF', 'compress', 'EMI'…"
          oninput="searchTools(this.value)" autocomplete="off">
        <button class="hero-search-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Search
        </button>
      </div>
      <div class="hero-stats" id="heroStats"></div>
    </div>
  </div>

  <div class="tools-main">

    <!-- BREADCRUMB -->
    <nav style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3);margin-bottom:1.25rem;flex-wrap:wrap" aria-label="Breadcrumb">
      <a href="/" style="color:var(--ink3);transition:color .15s" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--ink3)'">Home</a>
      <span style="color:var(--border2)">›</span>
      <span style="color:var(--ink2);font-weight:500">All Tools</span>
    </nav>

    <!-- CATEGORY TABS -->
    <div class="cat-tabs-wrap" id="catTabs"></div>

    <!-- TOOL SECTIONS — populated by JS -->
    <div id="toolSections"></div>

    <!-- PRO BANNER -->
    <div class="pro-banner">
      <div class="pro-banner-inner">
        <h3>🚀 ToolNest Pro — More Features, Same Privacy</h3>
        <p>Bulk processing, priority support, advanced tools aur zyaada. Starting ₹99/month.</p>
      </div>
      <div class="pro-banner-btns">
        <button class="btn-pro" onclick="location.href='/pricing.html'">View Pro Plans →</button>
        <button class="btn-ghost" onclick="location.href='/'">Stay Free</button>
      </div>
    </div>

  </div><!-- /tools-main -->

  <div id="tn-footer"></div>
</div>

<button style="position:fixed;bottom:0;right:0;z-index:500;background:linear-gradient(135deg,#FFDD00,#FF9500);color:#3D1C00;font-family:var(--f-display);font-size:12px;font-weight:700;padding:8px 16px 10px;border-radius:18px 18px 0 0;box-shadow:0 -4px 18px rgba(245,166,35,.35);cursor:pointer;display:flex;align-items:center;gap:6px;transform:translateY(2px);border:1.5px solid rgba(255,255,255,.45);border-bottom:none;transition:all .2s"
  onclick="window.open('https://buymeacoffee.com/toolnest','_blank')">
  <span>☕</span>Support ToolNest
</button>

<script src="/nav-footer.js"></script>

<script>
'use strict';

/* Category config */
var CAT_CONFIG = {
  'All':          { icon:'⚡', color:'var(--navy)',       bg:'var(--navy-l)'        },
  'Image Tools':  { icon:'🖼', color:'var(--c-image)',    bg:'var(--c-image-l)'     },
  'Compress':     { icon:'📦', color:'var(--c-compress)', bg:'var(--c-compress-l)'  },
  'Organize PDF': { icon:'📎', color:'var(--c-organize)', bg:'var(--c-organize-l)'  },
  'Edit & Secure':{ icon:'🔐', color:'var(--c-edit)',     bg:'var(--c-edit-l)'      },
  'Convert':      { icon:'🔄', color:'var(--c-convert)',  bg:'var(--c-convert-l)'   },
  'Productivity': { icon:'⚡', color:'var(--c-prod)',     bg:'var(--c-prod-l)'      },
  'Business':     { icon:'🏢', color:'var(--c-biz)',      bg:'var(--c-biz-l)'       },
  'Calculators':  { icon:'🧮', color:'var(--c-calc)',     bg:'var(--c-calc-l)'      },
};

var currentCat = 'All';
var currentSearch = '';

function waitForTN(cb) {
  if (window.TN && TN.tools && TN.tools.length) { cb(); return; }
  setTimeout(function(){ waitForTN(cb); }, 50);
}

waitForTN(function() {
  buildHeroStats();
  buildCatTabs();
  renderTools('All', '');
});

function buildHeroStats() {
  var cats = {};
  TN.tools.forEach(function(t){ cats[t.cat] = (cats[t.cat]||0)+1; });
  var total = TN.tools.length;
  document.getElementById('heroStats').innerHTML = [
    '<div class="hero-stat-pill"><span>'+total+'+</span> Tools</div>',
    '<div class="hero-stat-pill"><span>'+Object.keys(cats).length+'</span> Categories</div>',
    '<div class="hero-stat-pill"><span>0</span> Signups Needed</div>',
    '<div class="hero-stat-pill">🔒 Files Never Uploaded</div>',
  ].join('');
}

function buildCatTabs() {
  var cats = ['All'];
  var counts = { 'All': TN.tools.length };
  TN.tools.forEach(function(t){
    if (!cats.includes(t.cat)) cats.push(t.cat);
    counts[t.cat] = (counts[t.cat]||0)+1;
  });
  document.getElementById('catTabs').innerHTML = cats.map(function(cat){
    var cfg = CAT_CONFIG[cat] || { icon:'🔧' };
    var active = cat === currentCat ? ' active' : '';
    return '<button class="cat-tab'+active+'" onclick="filterCat(\''+cat+'\')">'+
      cfg.icon+' '+cat+
      '<span class="cat-tab-count">'+counts[cat]+'</span>'+
      '</button>';
  }).join('');
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(function(b){
    b.classList.toggle('active', b.textContent.trim().startsWith(CAT_CONFIG[cat]?CAT_CONFIG[cat].icon+' '+cat:cat));
  });
  /* Re-set active properly */
  document.querySelectorAll('.cat-tab').forEach(function(b){
    b.classList.remove('active');
  });
  var tabs = document.querySelectorAll('.cat-tab');
  var allCats = ['All'];
  TN.tools.forEach(function(t){ if (!allCats.includes(t.cat)) allCats.push(t.cat); });
  var idx = allCats.indexOf(cat);
  if (tabs[idx]) tabs[idx].classList.add('active');
  
  renderTools(cat, currentSearch);
  /* Track */
  TN.track('category_filter', { category: cat });
}

function searchTools(q) {
  currentSearch = q.toLowerCase().trim();
  renderTools(currentCat, currentSearch);
}

function renderTools(cat, search) {
  var tools = TN.tools.filter(function(t){
    var catMatch = cat === 'All' || t.cat === cat;
    var searchMatch = !search || t.name.toLowerCase().includes(search) || t.cat.toLowerCase().includes(search);
    return catMatch && searchMatch;
  });

  if (!tools.length) {
    document.getElementById('toolSections').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">Koi tool nahi mila</div><div class="empty-state-sub">Try karo: "PDF", "image", "calculator"…</div></div>';
    return;
  }

  /* Group by category */
  var grouped = {};
  if (cat !== 'All') {
    grouped[cat] = tools;
  } else {
    tools.forEach(function(t){
      if (!grouped[t.cat]) grouped[t.cat] = [];
      grouped[t.cat].push(t);
    });
  }

  var html = '';
  Object.entries(grouped).forEach(function(entry){
    var catName = entry[0], catTools = entry[1];
    var cfg = CAT_CONFIG[catName] || { icon:'🔧', color:'var(--gold)', bg:'var(--gold-l)' };
    html += '<div class="section-header">';
    html += '<div class="section-title" style="--before-bg:'+cfg.color+'"><span style="width:4px;height:18px;background:'+cfg.color+';border-radius:2px;display:inline-block;margin-right:8px"></span>'+cfg.icon+' '+catName+'</div>';
    html += '<div class="section-count">'+catTools.length+' tool'+(catTools.length>1?'s':'')+'</div>';
    html += '</div>';
    html += '<div class="tool-grid">';
    catTools.forEach(function(t){
      var badge = t.badge ? '<span class="tool-badge badge-'+t.badge.toLowerCase()+'">'+t.badge+'</span>' : '';
      /* Highlight search match in name */
      var displayName = t.name;
      if (search && displayName.toLowerCase().includes(search)) {
        var re = new RegExp('('+search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'gi');
        displayName = displayName.replace(re, '<mark class="search-highlight">$1</mark>');
      }
      /* Short descriptions by category */
      var descs = {
        'Image Tools': 'Image tools ke liye',
        'Compress': 'File size kam karo',
        'Organize PDF': 'PDF organize karo',
        'Edit & Secure': 'PDF secure karo',
        'Convert': 'Format convert karo',
        'Productivity': 'Productivity badhao',
        'Business': 'Business ke liye',
        'Calculators': 'Calculate karo instantly',
      };
      var desc = descs[t.cat] || 'Free online tool';
      html += '<div class="tool-card" onclick="goTool(\''+t.url+'\',\''+t.name+'\',\''+t.cat+'\')" style="--hover-border:'+cfg.color+'">';
      html += '<div class="tool-card-icon" style="background:'+cfg.bg+';color:'+cfg.color+'">'+t.icon+'</div>';
      html += '<div class="tool-card-body"><div class="tool-card-name">'+displayName+'</div><div class="tool-card-desc">'+desc+'</div></div>';
      html += badge;
      html += '</div>';
    });
    html += '</div>';
  });

  document.getElementById('toolSections').innerHTML = html;
}

function goTool(url, name, cat) {
  TN.track('tool_click', { tool_name: name, tool_cat: cat, source: 'tools_listing' });
  location.href = url;
}
</script>
