<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JSON Formatter & Validator Online Free | ToolNest</title>
<meta name="description" content="Format, validate, minify and beautify JSON data online. Syntax highlighting. Tree view. Free online JSON formatter.">




<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<meta name="theme-color" content="#0F1B3D">
<meta name="google-site-verification" content="dbfc89456a05e36c">
<link rel="stylesheet" href="/style.css">
<script src="/darkmode.js"></script>
</head>
<body>
<div id="tn-nav"></div>
<div class="hero">
  <div class="hi">{ }</div>
  <h1>JSON Formatter & Validator</h1>
  <p class="sub">Format, validate, minify and beautify JSON data. Syntax highlighting included. Free and instant.</p>
</div>
<div class="wrap">
  <div class="ad">[ Advertisement ]</div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="tb-btn primary" onclick="formatJSON()">✨ Format / Beautify</button>
    <button class="tb-btn" onclick="minifyJSON()">📦 Minify</button>
    <button class="tb-btn success" onclick="validateJSON()">✅ Validate</button>
    <button class="tb-btn" onclick="copyOutput()">📋 Copy Output</button>
    <button class="tb-btn" onclick="downloadJSON()">📥 Download</button>
    <button class="tb-btn danger" onclick="clearAll()">🗑 Clear</button>
    <select class="indent-sel" id="indentSel" title="Indent size">
      <option value="2" selected>2 spaces</option>
      <option value="4">4 spaces</option>
      <option value="tab">Tab</option>
    </select>
    <div class="status-pill s-empty" id="statusPill">Ready</div>
  </div>

  <!-- EDITOR GRID -->
  <div class="editor-grid">
    <div class="editor-panel">
      <div class="ep-header">
        <div class="ep-title">Input JSON</div>
        <div class="ep-actions">
          <button class="ep-btn" onclick="pasteInput()">Paste</button>
          <button class="ep-btn" onclick="loadSample()">Sample</button>
          <button class="ep-btn" onclick="document.getElementById('jsonInput').value='';setStatus('empty')">Clear</button>
        </div>
      </div>
      <div class="ep-body">
        <textarea class="editor" id="jsonInput" placeholder='Paste your JSON here...&#10;&#10;{&#10;  "name": "ToolNest",&#10;  "version": 1,&#10;  "free": true&#10;}' oninput="liveValidate()" spellcheck="false"></textarea>
      </div>
    </div>
    <div class="editor-panel">
      <div class="ep-header">
        <div class="ep-title">Output</div>
        <div class="ep-actions">
          <button class="ep-btn" onclick="copyOutput()">Copy</button>
          <button class="ep-btn" onclick="downloadJSON()">Download</button>
        </div>
      </div>
      <div class="ep-body">
        <pre class="output-pre" id="jsonOutput"><span style="color:var(--i3);font-size:12px">Click "Format" or start typing to see output here...</span></pre>
      </div>
    </div>
  </div>

  <!-- ERROR BAR -->
  <div class="err-bar" id="errBar"></div>

  <!-- STATS -->
  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-chip">Keys: <b id="sKeys">0</b></div>
    <div class="stat-chip">Depth: <b id="sDepth">0</b></div>
    <div class="stat-chip">Size: <b id="sSize">0 B</b></div>
    <div class="stat-chip">Type: <b id="sType">—</b></div>
  </div>

  <div class="ad">[ Advertisement ]</div>
</div>
<div id="tn-footer"></div>

<script>
let lastValid=null;

function getIndent(){const v=document.getElementById('indentSel').value;return v==='tab'?'\t':+v}

function formatJSON(){
  const raw=document.getElementById('jsonInput').value.trim();
  if(!raw){setStatus('empty');return}
  try{
    const parsed=JSON.parse(raw);
    lastValid=parsed;
    const formatted=JSON.stringify(parsed,null,getIndent());
    document.getElementById('jsonOutput').innerHTML=highlight(formatted);
    setStatus('valid');
    updateStats(parsed,formatted);
    hideErr();
  }catch(e){setStatus('invalid');showErr(e.message)}
}

function minifyJSON(){
  const raw=document.getElementById('jsonInput').value.trim();
  if(!raw){setStatus('empty');return}
  try{
    const parsed=JSON.parse(raw);
    const mini=JSON.stringify(parsed);
    document.getElementById('jsonOutput').textContent=mini;
    setStatus('valid');
    hideErr();
  }catch(e){setStatus('invalid');showErr(e.message)}
}

function validateJSON(){
  const raw=document.getElementById('jsonInput').value.trim();
  if(!raw){setStatus('empty');return}
  try{
    JSON.parse(raw);
    setStatus('valid');
    hideErr();
    document.getElementById('errBar').style.display='block';
    document.getElementById('errBar').style.background='var(--grb)';
    document.getElementById('errBar').style.borderColor='var(--grbr)';
    document.getElementById('errBar').style.color='#065F46';
    document.getElementById('errBar').textContent='✅ Valid JSON!';
  }catch(e){setStatus('invalid');showErr(e.message)}
}

function liveValidate(){
  const raw=document.getElementById('jsonInput').value.trim();
  if(!raw){setStatus('empty');hideErr();document.getElementById('statsRow').style.display='none';return}
  try{JSON.parse(raw);setStatus('valid');hideErr()}
  catch(e){setStatus('invalid')}
}

function highlight(json){
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|[{}\[\],:])/g,match=>{
    if(/^"/.test(match)){
      if(/:$/.test(match))return`<span class="j-key">${esc(match)}</span>`;
      return`<span class="j-str">${esc(match)}</span>`;
    }
    if(/true|false/.test(match))return`<span class="j-bool">${match}</span>`;
    if(/null/.test(match))return`<span class="j-null">${match}</span>`;
    if(/[{}\[\]]/.test(match))return`<span class="j-punc">${match}</span>`;
    if(/[,:]/.test(match))return`<span class="j-punc">${match}</span>`;
    return`<span class="j-num">${match}</span>`;
  });
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function updateStats(parsed,formatted){
  document.getElementById('statsRow').style.display='flex';
  document.getElementById('sKeys').textContent=countKeys(parsed);
  document.getElementById('sDepth').textContent=maxDepth(parsed);
  document.getElementById('sSize').textContent=fmtSize(new Blob([formatted]).size);
  document.getElementById('sType').textContent=Array.isArray(parsed)?'Array':typeof parsed==='object'&&parsed?'Object':typeof parsed;
}
function countKeys(o){if(typeof o!=='object'||!o)return 0;let c=Object.keys(o).length;Object.values(o).forEach(v=>{c+=countKeys(v)});return c}
function maxDepth(o){if(typeof o!=='object'||!o)return 0;return 1+Math.max(0,...Object.values(o).map(maxDepth))}

function setStatus(s){
  const p=document.getElementById('statusPill');
  p.className='status-pill';
  if(s==='valid'){p.classList.add('s-valid');p.textContent='✅ Valid JSON'}
  else if(s==='invalid'){p.classList.add('s-invalid');p.textContent='❌ Invalid JSON'}
  else{p.classList.add('s-empty');p.textContent='Ready'}
}
function showErr(m){
  const b=document.getElementById('errBar');b.style.display='block';
  b.style.background='var(--rdb)';b.style.borderColor='#FECACA';b.style.color='var(--rd)';
  b.textContent='⚠️ Parse Error: '+m;
}
function hideErr(){const b=document.getElementById('errBar');b.style.display='none'}

function copyOutput(){
  const txt=document.getElementById('jsonOutput').textContent;
  if(!txt||txt.includes('Click'))return;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=event.target;const old=btn.textContent;btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent=old,1500);
  });
}
function downloadJSON(){
  const txt=document.getElementById('jsonOutput').textContent;
  if(!txt||txt.includes('Click'))return;
  const blob=new Blob([txt],{type:'application/json'});
  Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'toolnest-formatted.json'}).click();
}
function clearAll(){document.getElementById('jsonInput').value='';document.getElementById('jsonOutput').innerHTML='<span style="color:var(--i3);font-size:12px">Click "Format" or start typing to see output here...</span>';setStatus('empty');hideErr();document.getElementById('statsRow').style.display='none'}
async function pasteInput(){
  try{const t=await navigator.clipboard.readText();document.getElementById('jsonInput').value=t;liveValidate()}
  catch{document.getElementById('jsonInput').focus()}
}
function loadSample(){
  const sample={name:"ToolNest",version:2,description:"Free online tools",free:true,tools:["Merge PDF","Compress PDF","Image Compressor","QR Code","GST Invoice"],meta:{author:"BhaiHelp",country:"India",users:50000,rating:4.9}};
  document.getElementById('jsonInput').value=JSON.stringify(sample,null,2);
  formatJSON();
}
function fmtSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'}
</script>
<script src="/nav-footer.js"></script>
</body>
</html>
