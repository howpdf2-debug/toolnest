<style>
.bf-pill{display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:999px;border:1.5px solid var(--border);background:var(--white);font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.bf-pill:hover{border-color:var(--gold);color:var(--gold-d);background:var(--gold-l)}
.bf-pill.active{background:var(--navy);border-color:var(--navy);color:#fff}
.bfbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.75rem;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.bfbar::-webkit-scrollbar{display:none}
.bcard{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-xl);overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--sh-xs)}
.bcard:hover{border-color:var(--gold-b);box-shadow:0 0 0 3px var(--gold-b),var(--sh);transform:translateY(-3px)}
.bcard-top{height:5px;background:linear-gradient(90deg,var(--gold),var(--gold-d))}
.bcard-body{padding:1.35rem}
.bcat{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 11px;border-radius:999px;background:var(--gold-l);color:var(--gold-d);margin-bottom:.65rem;text-transform:uppercase;letter-spacing:.4px}
.bfeat{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--navy);color:var(--gold);margin-left:5px}
.btitle{font-family:var(--f-display);font-size:15px;font-weight:800;color:var(--ink);margin-bottom:.45rem;line-height:1.35}
.bexc{font-size:13px;color:var(--ink2);line-height:1.65;margin-bottom:.8rem}
.bmeta{font-size:12px;color:var(--ink3);display:flex;gap:10px;align-items:center}
.bmore{font-size:13px;font-weight:700;color:var(--gold-d);margin-top:.7rem;display:block}
.bcard:hover .bmore{color:var(--gold)}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;margin-bottom:2rem}
.bnone{text-align:center;padding:3rem;color:var(--ink3);grid-column:1/-1}
.bnone-icon{font-size:2.5rem;display:block;margin-bottom:.5rem}
</style>

var activeTag = 'All';

function fmtDate(d) {
  try {
    return new Date(d).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
  } catch(e) { return d; }
}

function renderFilter() {
  var cats = ['All'];
  POSTS.forEach(function(p) {
    if (cats.indexOf(p.category) === -1) cats.push(p.category);
  });
  var html = '';
  cats.forEach(function(c) {
    html += '<div class="bf-pill' + (c === 'All' ? ' active' : '') + '" onclick="setTag(\'' + c + '\',this)">' + c + '</div>';
  });
  document.getElementById('filterBar').innerHTML = html;
}

function setTag(tag, el) {
  activeTag = tag;
  var pills = document.querySelectorAll('.bf-pill');
  for (var i = 0; i < pills.length; i++) pills[i].classList.remove('active');
  el.classList.add('active');
  renderPosts();
}

function renderPosts() {
  var list = activeTag === 'All' ? POSTS : POSTS.filter(function(p) { return p.category === activeTag; });
  document.getElementById('blogTitle').textContent = activeTag === 'All' ? 'All Articles' : activeTag;
  document.getElementById('blogCount').textContent = list.length + ' article' + (list.length === 1 ? '' : 's');

  if (!list.length) {
    document.getElementById('blogGrid').innerHTML = '<div class="bnone"><span class="bnone-icon">📭</span><p>No articles yet in this category.</p></div>';
    return;
  }

  var html = '';
  list.forEach(function(p) {
    html += '<div class="bcard" onclick="location.href=\'/blog/' + p.slug + '.html\'">';
    html += '<div class="bcard-top"></div>';
    html += '<div class="bcard-body">';
    html += '<span class="bcat">' + p.category + '</span>';
    if (p.featured) html += '<span class="bfeat">⭐ Featured</span>';
    html += '<div class="btitle">' + p.title + '</div>';
    html += '<div class="bexc">' + p.excerpt + '</div>';
    html += '<div class="bmeta"><span>📅 ' + fmtDate(p.date) + '</span><span>⏱ ' + p.readTime + ' read</span></div>';
    html += '<span class="bmore">Read article →</span>';
    html += '</div></div>';
  });
  document.getElementById('blogGrid').innerHTML = html;
}

function init() {
  renderFilter();
  renderPosts();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
