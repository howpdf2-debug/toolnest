<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blog — ToolNest | Expert Tips & Guides</title>
<meta name="description" content="Free tools ke expert tips, GST invoice guide, PDF tricks, resume tips aur productivity hacks.">
<link rel="stylesheet" href="/style.css">
<script src="/darkmode.js"></script>
</head>
<body>
<div id="tn-nav"></div>

<!-- Improved Mini Hero -->
<div class="mini-hero" style="padding:4rem 1.5rem 3rem;">
  <div style="max-width:800px;margin:0 auto;text-align:center;">
    <h1 style="font-size:clamp(2rem,5vw,3.2rem);font-weight:900;color:#fff;margin-bottom:1rem;">ToolNest Blog</h1>
    <p style="font-size:1.1rem;color:rgba(255,255,255,0.75);max-width:600px;margin:0 auto;">Practical tips, tutorials & guides for PDF tools, GST invoicing, image optimization, resume building & more.</p>
  </div>
</div>

<div class="page-wrap">
  <!-- Featured Posts -->
  <div id="featuredSection" style="display:none;margin-bottom:3rem;">
    <div class="sec-hd"><div class="sec-title">⭐ Featured Articles</div></div>
    <div id="featuredGrid" class="blog-grid" style="grid-template-columns:repeat(auto-fill,minmax(320px,1fr));"></div>
  </div>

  <!-- Category Filter -->
  <div class="cat-scroll" id="catFilter" style="margin-bottom:2rem;display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;"></div>

  <!-- All Articles -->
  <div class="sec-hd">
    <div class="sec-title" id="blogTitle">All Articles</div>
    <div class="sec-more" id="blogCount"></div>
  </div>

  <div class="blog-grid" id="blogGrid"></div>

  <div id="noArticles" style="display:none;text-align:center;padding:4rem 1rem;color:#888;">
    <p style="font-size:1.3rem;">No articles found</p>
  </div>
</div>

<div id="tn-footer"></div>
<script src="/nav-footer.js"></script>

<script>
// Same loadPosts, renderCats, filterTag functions rakh sakte ho (tumhare purane code se)

function renderPosts(filteredPosts) {
  // Featured alag render
  const featured = filteredPosts.filter(p => p.featured);
  if (featured.length > 0) {
    document.getElementById('featuredSection').style.display = 'block';
    document.getElementById('featuredGrid').innerHTML = featured.map(p => createCardHTML(p, true)).join('');
  }

  const normal = filteredPosts.filter(p => !p.featured);
  const grid = document.getElementById('blogGrid');
  grid.innerHTML = normal.map(p => createCardHTML(p)).join('');
  
  document.getElementById('blogCount').textContent = filteredPosts.length + ' articles';
}

function createCardHTML(p, isFeatured = false) {
  const date = new Date(p.date).toLocaleDateString('en-IN', {year:'numeric', month:'short', day:'numeric'});
  return `
    <div class="blog-card ${isFeatured ? 'featured-card' : ''}" onclick="navigateToArticle('${p.slug}')">
      ${p.thumbnail ? `<img src="${p.thumbnail}" alt="${p.title}" style="width:100%;height:180px;object-fit:cover;border-radius:12px 12px 0 0;">` : ''}
      <div class="blog-card-body" style="padding:1.25rem;">
        <div class="blog-cat">${p.category}</div>
        <div class="blog-title">${p.title}</div>
        <div class="blog-excerpt" style="display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${p.excerpt}</div>
        <div class="blog-meta">
          <span>${date}</span>
          <span>${p.readTime}</span>
        </div>
      </div>
    </div>
  `;
}

// navigateToArticle same rakho (baad mein blog-post.html?slug= pe point karenge)
</script>
</body>
</html>
