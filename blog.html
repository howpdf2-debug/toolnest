<script>
let posts = [], activeTag = 'All';

async function loadPosts() {
  try {
    const r = await fetch('/blog-data.json');
    posts = await r.json();
  } catch(e) {
    console.log('Loading fallback blog data');
    // Fallback inline data with COMPLETE article info
    posts = [
      {
        title: "Complete GST Invoice Guide for Indian Businesses",
        slug: "gst-invoice-guide",
        excerpt: "Master GST invoice creation with our comprehensive guide. Learn mandatory fields, tax calculations, HSN/SAC codes, and compliance requirements for Indian businesses.",
        date: "2026-02-20",
        category: "Business",
        readTime: "10 min",
        featured: true,
        author: "ToolNest Team",
        keywords: "GST invoice, GST billing, invoice format, tax invoice India"
      },
      {
        title: "Image Compression Tips for Faster Websites",
        slug: "image-compression-tips",
        excerpt: "Learn how to compress images without losing quality. Improve website speed, SEO rankings, and user experience with proven compression techniques.",
        date: "2026-02-21",
        category: "Web Development",
        readTime: "8 min",
        featured: false,
        author: "ToolNest Team",
        keywords: "image compression, optimize images, website speed, image optimization"
      },
      {
        title: "Best Free PDF Tools for Students in 2026",
        slug: "pdf-tools-for-students",
        excerpt: "Discover essential free PDF tools every student needs. Merge, convert, compress, and annotate PDFs without spending money. Perfect for assignments and research.",
        date: "2026-02-22",
        category: "Education",
        readTime: "12 min",
        featured: false,
        author: "ToolNest Team",
        keywords: "PDF tools students, free PDF editor, student tools, PDF converter"
      },
      {
        title: "10 Best Free Online Tools for Small Businesses",
        slug: "small-business-online-tools-2026",
        excerpt: "Discover the top 10 free online tools every small business needs in 2026. Save time, reduce costs, and boost productivity with these essential tools.",
        date: "2026-02-25",
        category: "Business",
        readTime: "12 min",
        featured: true,
        author: "ToolNest Team",
        keywords: "small business tools, free business tools, productivity tools, business software"
      },
      {
        title: "SEO Meta Tags Guide: Complete Tutorial for 2026",
        slug: "seo-meta-tags-guide",
        excerpt: "Complete guide to SEO meta tags. Learn title tags, meta descriptions, Open Graph tags, Twitter cards, and schema markup to boost your search rankings.",
        date: "2026-02-23",
        category: "SEO",
        readTime: "15 min",
        featured: false,
        author: "ToolNest Team",
        keywords: "SEO meta tags, title tags, meta description, Open Graph, schema markup"
      },
      {
        title: "Professional Resume Writing Tips for 2026",
        slug: "resume-writing-tips-2026",
        excerpt: "Master resume writing with ATS optimization, modern formats, powerful action verbs and proven strategies to land more interviews in 2026.",
        date: "2026-02-27",
        category: "Career",
        readTime: "18 min",
        featured: true,
        author: "ToolNest Team",
        keywords: "resume writing, CV tips, ATS resume, job application, resume format"
      }
    ];
  }
  renderCats();
  renderPosts();
}

function renderCats() {
  const cats = ['All', ...new Set(posts.map(p => p.category))];
  const catHTML = cats.map(c => `
    <div class="cat-chip${c === 'All' ? ' active' : ''}" onclick="filterTag('${c}', this)">
      ${c}
    </div>
  `).join('');
  document.getElementById('catFilter').innerHTML = catHTML;
}

function filterTag(tag, el) {
  activeTag = tag;
  
  // Update active state
  document.querySelectorAll('#catFilter .cat-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  
  // Track category filter in Analytics (if available)
  if (typeof gtag !== 'undefined') {
    gtag('event', 'category_filter', {
      'event_category': 'Blog',
      'event_label': tag
    });
  }
  
  renderPosts();
}

function renderPosts() {
  const filtered = activeTag === 'All' ? posts : posts.filter(p => p.category === activeTag);
  
  // Update count and title
  document.getElementById('blogCount').textContent = filtered.length + ' article' + (filtered.length !== 1 ? 's' : '');
  document.getElementById('blogTitle').textContent = activeTag === 'All' ? 'All Articles' : activeTag;
  
  // Show/hide no articles message
  const blogGrid = document.getElementById('blogGrid');
  const noArticles = document.getElementById('noArticles');
  
  if (filtered.length === 0) {
    blogGrid.style.display = 'none';
    noArticles.style.display = 'block';
    return;
  } else {
    blogGrid.style.display = 'grid';
    noArticles.style.display = 'none';
  }
  
  // Render blog cards
  const cardsHTML = filtered.map(p => {
    const date = new Date(p.date);
    const formattedDate = date.toLocaleDateString('en-IN', {
      year: 'numeric',
      month: 'short',
      day: 'numeric'
    });
    
    return `
    <div class="blog-card" onclick="navigateToArticle('${p.slug}')" role="article" aria-label="${p.title}">
      <div class="blog-card-body">
        <div class="blog-cat">${p.category}</div>
        <div class="blog-title">${p.title}</div>
        <div class="blog-excerpt">${p.excerpt}</div>
        <div class="blog-meta">
          <span>📅 ${formattedDate}</span>
          <span>⏱ ${p.readTime}</span>
          ${p.featured ? '<span style="color:var(--brand);font-weight:600">⭐ Featured</span>' : ''}
        </div>
      </div>
    </div>
    `;
  }).join('');
  
  blogGrid.innerHTML = cardsHTML;
}

function navigateToArticle(slug) {
  // Track article click in Analytics
  if (typeof gtag !== 'undefined') {
    gtag('event', 'article_click', {
      'event_category': 'Blog',
      'event_label': slug
    });
  }
  
  window.location.href = '/blog/' + slug + '.html';
}

// Initialize on page load
loadPosts();

// Add keyboard navigation
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    // Reset to All categories
    filterTag('All', document.querySelector('#catFilter .cat-chip'));
  }
});
</script>
