<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="dbfc89456a05e36c" />
    
    <title>Blog - ToolNest | Tips & Tutorials</title>
    <meta name="description" content="Read ToolNest blog for expert tips and tutorials">
    <meta name="robots" content="index, follow">
    
    <link rel="canonical" href="https://toolnest.bhaihelp.in/blog.html">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/style.css">
    
    <style>
        .featured-post {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: #fff;
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 40px;
        }
        
        .featured-post h2 {
            color: #fff;
            margin-bottom: 15px;
        }
        
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .blog-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        
        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        
        .blog-image {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .blog-category {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
        }
        
        .blog-content {
            padding: 20px;
        }
        
        .blog-content h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        .blog-meta {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 12px;
        }
        
        .read-more {
            color: var(--blue);
            font-weight: 600;
            text-decoration: none;
        }
        
        #loadingIndicator {
            text-align: center;
            padding: 60px 20px;
            font-size: 16px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div id="header"></div>

<section class="mini-hero">
    <div class="hero-top">
        <a href="/index.html" class="back-home">← Back to Home</a>
    </div>
    <h1>📚 ToolNest Blog</h1>
    <p>Tips, tutorials, and guides</p>
</section>

<main class="container">
    
    <section class="featured-post" id="featuredPost" style="display: none;"></section>
    
    <div id="loadingIndicator">
        <p>⏳ Loading blog posts...</p>
        <p style="font-size: 14px; margin-top: 10px;">Check console (F12) for details</p>
    </div>
    
    <div class="blog-grid" id="blogGrid"></div>
    
</main>

<div id="footer"></div>

<script src="/includes/include.js"></script>

<script>
// ULTRA SIMPLE VERSION - MAXIMUM DEBUG
console.log('🚀 Script started');

let allPosts = [];

async function loadBlogPosts() {
    console.log('1️⃣ loadBlogPosts function called');
    
    const loadingDiv = document.getElementById('loadingIndicator');
    const blogGrid = document.getElementById('blogGrid');
    
    try {
        console.log('2️⃣ About to fetch /blog-data.json');
        
        const response = await fetch('/blog-data.json', {
            method: 'GET',
            headers: {
                'Accept': 'application/json'
            }
        });
        
        console.log('3️⃣ Fetch completed');
        console.log('   Status:', response.status);
        console.log('   OK:', response.ok);
        
        if (!response.ok) {
            throw new Error('HTTP ' + response.status);
        }
        
        console.log('4️⃣ Getting text...');
        const text = await response.text();
        console.log('   Text length:', text.length);
        console.log('   First 100 chars:', text.substring(0, 100));
        
        console.log('5️⃣ Parsing JSON...');
        const posts = JSON.parse(text);
        console.log('   Posts count:', posts.length);
        console.log('   First post:', posts[0].title);
        
        allPosts = posts;
        
        console.log('6️⃣ Hiding loading...');
        loadingDiv.style.display = 'none';
        
        console.log('7️⃣ Displaying posts...');
        displayPosts(posts);
        
        console.log('✅ SUCCESS - All done!');
        
    } catch (error) {
        console.error('❌ ERROR:', error);
        console.error('   Message:', error.message);
        console.error('   Stack:', error.stack);
        
        loadingDiv.innerHTML = `
            <h3 style="color: #ef4444;">❌ Error</h3>
            <p>${error.message}</p>
            <p style="font-size: 13px;">Check console (F12) for details</p>
            <button onclick="location.reload()" class="btn-primary">Retry</button>
        `;
    }
}

function displayPosts(posts) {
    console.log('📝 displayPosts called with', posts.length, 'posts');
    
    const grid = document.getElementById('blogGrid');
    
    const colors = {
        'Business': '#2563eb',
        'Career': '#6366f1',
        'SEO': '#f59e0b',
        'Writing': '#06b6d4',
        'Technology': '#dc2626',
        'Education': '#10b981'
    };
    
    grid.innerHTML = posts.map(post => `
        <article class="blog-card">
            <div class="blog-image" style="background: ${colors[post.category] || '#2563eb'};">
                <span class="blog-category">${post.category}</span>
            </div>
            <div class="blog-content">
                <h3>${post.title}</h3>
                <p class="blog-meta">📅 ${post.date} • ⏱️ ${post.readTime}</p>
                <p>${post.excerpt.substring(0, 100)}...</p>
                <a href="/blog/${post.slug}.html" class="read-more">Read More →</a>
            </div>
        </article>
    `).join('');
    
    console.log('✅ Posts displayed in grid');
}

// START
console.log('🏁 Auto-starting load...');
setTimeout(loadBlogPosts, 100);
</script>

</body>
</html>
